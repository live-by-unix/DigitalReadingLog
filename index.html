
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="index.png">
  <title>DigitalReadingLog</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>DigitalReadingLog.com</h1>
      <p class="subtitle">
        The paper reading log — without the paper problems.
      </p>

      <div class="top-actions">
        <button id="exportBtn">Export PDF</button>
        <button id="printBtn">Print</button>
        <button id="clearBtn" class="danger">Clear Log</button>
      </div>

      <div class="save-status" id="saveStatus">✓ Saved Automatically</div>
    </header>

    <section class="timer-card">
      <h2>Reading Timer</h2>

      <div class="timer-controls">
        <input type="number" id="timerMinutes" min="1" value="25"/>
        <span>minutes</span>
      </div>

      <div class="preset-buttons">
        <button class="preset" data-min="15">15</button>
        <button class="preset" data-min="20">20</button>
        <button class="preset" data-min="25">25</button>
        <button class="preset" data-min="30">30</button>
      </div>

      <div class="timer-display" id="timerDisplay">25:00</div>

      <div class="timer-buttons">
        <button id="startTimer">Start</button>
        <button id="pauseTimer">Pause</button>
        <button id="resetTimer">Reset</button>
      </div>
    </section>

    <section class="reading-log" id="readingLog">
      <div class="top-fields">
        <label>
          Name
          <input type="text" data-save="studentName">
        </label>

        <label>
          Homeroom
          <input type="text" data-save="homeroom">
        </label>

        <label>
          Week Of
          <input type="date" data-save="weekOf">
        </label>
      </div>

      <div class="goal-section">
        <label>
          Goal for the Week
          <input type="text" data-save="weeklyGoal">
        </label>

        <label>
          Goal Met?
          <select data-save="goalMet">
            <option value="">Select</option>
            <option>YES</option>
            <option>NO</option>
          </select>
        </label>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Day</th>
              <th>Book Title(s)</th>
              <th>Genre</th>
              <th>Total Minutes</th>
              <th>Pages</th>
              <th>Parent Initials</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <div class="legend">
        Genre: NF (nonfiction), F (fiction)
      </div>
    </section>
  </div>

  <div class="signature-modal hidden" id="signatureModal">
    <div class="signature-box">
      <h3>Parent Initials</h3>

      <canvas id="signatureCanvas" width="300" height="150"></canvas>

      <div class="signature-actions">
        <button id="clearSignature">Clear</button>
        <button id="saveSignature">Save</button>
        <button id="closeSignature">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
